[tools]
node = "24"
pnpm = "11.5.2"

[tasks.setup]
description = "Install Headwater daemon, frontend, and desktop dependencies"
run = "pnpm setup"

[tasks.check]
description = "Run all Headwater type checks"
run = "pnpm check"

[tasks.test]
description = "Run all Headwater unit tests"
run = "pnpm test"

[tasks.build]
description = "Build the Headwater frontend, production daemon, and desktop host"
run = "pnpm build"
