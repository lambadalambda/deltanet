[tools]
node = "24"
pnpm = "11.5.2"

[tasks.setup]
description = "Install Headwater daemon and frontend dependencies"
run = "pnpm setup"

[tasks.check]
description = "Run Headwater daemon and frontend type checks"
run = "pnpm check"

[tasks.test]
description = "Run Headwater daemon and frontend tests"
run = "pnpm test"

[tasks.build]
description = "Build the Headwater frontend and production daemon"
run = "pnpm build"
