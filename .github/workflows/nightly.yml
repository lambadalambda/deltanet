name: Desktop Nightly

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-nightly-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: 11.5.2
  NODE_VERSION: 24
  NIGHTLY_VERSION: 0.0.1-nightly.${{ github.run_number }}
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  checks:
    name: Checks and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            daemon/pnpm-lock.yaml
            frontend/pnpm-lock.yaml
            desktop/pnpm-lock.yaml
      - name: Install dependencies
        run: |
          pnpm --dir daemon install --frozen-lockfile
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir desktop install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --dir frontend exec playwright install --with-deps chromium
      - name: Run checks
        run: pnpm check
      - name: Run tests
        run: pnpm test

  linux:
    name: Linux x64 packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            daemon/pnpm-lock.yaml
            frontend/pnpm-lock.yaml
            desktop/pnpm-lock.yaml
      - name: Install dependencies
        run: |
          pnpm --dir daemon install --frozen-lockfile
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir desktop install --frozen-lockfile
      - name: Install Flatpak toolchain and runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus-x11 flatpak flatpak-builder xvfb
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.electronjs.Electron2.BaseApp//24.08
      - name: Build and verify staged resources
        run: pnpm build && pnpm --dir desktop verify:resources
      - name: Build Flatpak and AppImage
        run: pnpm --dir desktop package:linux --config.extraMetadata.version=${NIGHTLY_VERSION}
      - name: Smoke AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          appimage="$(find desktop/release -maxdepth 1 -name '*.AppImage' -print -quit)"
          test -n "${appimage}"
          export HEADWATER_DESKTOP_SMOKE_EXECUTABLE="${appimage}"
          dbus-run-session -- xvfb-run -a node desktop/scripts/smoke.mjs
      - name: Verify Linux outputs
        run: |
          test -x desktop/resources/native/deltachat-rpc-server
          test -n "$(find desktop/release -maxdepth 1 -name '*.flatpak' -print -quit)"
          test -n "$(find desktop/release -maxdepth 1 -name '*.AppImage' -print -quit)"
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-linux-${{ github.sha }}
          path: |
            desktop/release/*.flatpak
            desktop/release/*.AppImage
          if-no-files-found: error
          retention-days: 7

  windows:
    name: Windows x64 installer
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            daemon/pnpm-lock.yaml
            frontend/pnpm-lock.yaml
            desktop/pnpm-lock.yaml
      - name: Install dependencies
        shell: pwsh
        run: |
          pnpm --dir daemon install --frozen-lockfile
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir desktop install --frozen-lockfile
      - name: Build and verify staged resources
        shell: pwsh
        run: pnpm build; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; pnpm --dir desktop verify:resources
      - name: Build NSIS installer
        shell: pwsh
        run: pnpm --dir desktop package:win --config.extraMetadata.version=$env:NIGHTLY_VERSION
      - name: Verify Windows output
        shell: pwsh
        run: |
          if (-not (Test-Path desktop/resources/native/deltachat-rpc-server.exe)) { throw 'missing staged Delta Chat helper' }
          if (-not (Get-ChildItem desktop/release/*.exe -ErrorAction SilentlyContinue)) { throw 'missing Windows installer' }
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-windows-${{ github.sha }}
          path: desktop/release/*.exe
          if-no-files-found: error
          retention-days: 7

  macos:
    name: macOS arm64 DMG
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            daemon/pnpm-lock.yaml
            frontend/pnpm-lock.yaml
            desktop/pnpm-lock.yaml
      - name: Install dependencies
        run: |
          pnpm --dir daemon install --frozen-lockfile
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir desktop install --frozen-lockfile
      - name: Build and verify staged resources
        run: pnpm build && pnpm --dir desktop verify:resources
      - name: Build unsigned DMG
        run: pnpm --dir desktop package:mac --config.extraMetadata.version=${NIGHTLY_VERSION}
      - name: Smoke packaged app
        env:
          HEADWATER_DESKTOP_SMOKE_EXECUTABLE: ${{ github.workspace }}/desktop/release/mac-arm64/Headwater.app/Contents/MacOS/Headwater
        run: node desktop/scripts/smoke.mjs
      - name: Verify macOS output
        run: |
          test -x desktop/resources/native/deltachat-rpc-server
          test -n "$(find desktop/release -maxdepth 1 -name '*.dmg' -print -quit)"
          codesign --verify --deep --strict desktop/release/mac-arm64/Headwater.app
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-${{ github.sha }}
          path: desktop/release/*.dmg
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish rolling nightly prerelease
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [checks, linux, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: nightly-*-${{ github.sha }}
          path: nightly-artifacts
          merge-multiple: true
      - name: Verify this is still the main branch head
        env:
          GH_TOKEN: ${{ github.token }}
        run: test "$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq .object.sha)" = "${GITHUB_SHA}"
      - name: Generate checksums
        working-directory: nightly-artifacts
        run: sha256sum *.flatpak *.AppImage *.exe *.dmg > SHA256SUMS.txt
      - name: Replace nightly prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: |
            Unsigned development builds from commit `${{ github.sha }}`. These artifacts are not notarized or signed by a trusted developer certificate and may trigger operating-system security warnings.

            ## Security status

            Desktop signup and restore privately redeem the daemon's rotated one-time enrollment code and continue into sign-in without terminal input; the raw code is never exposed to the renderer, logs, command-line arguments, or files. Main-generated, operation-bound, short-lived bootstrap proofs protect signup, restore, and initial OAuth registration. Broader tray/background policy, abrupt-process recovery, failure UX, and full packaged create/restore acceptance scenarios remain unfinished. Treat identities created with these alpha builds as disposable while that work remains incomplete.

            ## Choose a download

            ### Linux x64 Flatpak (`.flatpak`) - recommended

            Use this on Linux when Flatpak is available and you want Headwater isolated from the rest of your home directory. It requires the Freedesktop 24.08 runtime; Flatpak downloads that shared runtime during the first installation if necessary.

            Install and run it with:

            ```sh
            flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
            flatpak install --user ./Headwater-*.flatpak
            flatpak run social.pleroma.Headwater
            ```

            Data is stored separately from the AppImage build under `~/.var/app/social.pleroma.Headwater/config/Headwater/`. The daemon identity and account state are inside its `daemon/` directory. This sideloaded bundle has no update remote, so download and reinstall a newer nightly manually.

            ### Linux x64 AppImage (`.AppImage`)

            Use this when you want a single executable or do not have Flatpak. It is not sandboxed and has the same access as any program you run. The AppImage file is portable, but your Headwater identity and settings are not stored inside it.

            Run it with:

            ```sh
            chmod +x ./Headwater-*.AppImage
            ./Headwater-*.AppImage
            ```

            Data is stored under `$XDG_CONFIG_HOME/Headwater/` when that variable is set, or `~/.config/Headwater/` by default, with daemon identity and account state in `daemon/`. Some distributions require FUSE to launch AppImages; `./Headwater-*.AppImage --appimage-extract-and-run` is a fallback. AppImage nightlies do not update automatically.

            ### Windows x64 installer (`.exe`)

            Run the NSIS installer and choose an installation directory. Windows SmartScreen may warn because the installer is unsigned. Data is stored under `%APPDATA%\Headwater\`, with daemon identity and account state in `daemon\`. Install newer nightlies manually over the existing application; uninstalling the application may leave this data in place.

            ### macOS Apple silicon (`.dmg`)

            This build requires an arm64 Apple silicon Mac. Open the DMG and drag Headwater into Applications. The app is ad-hoc sealed for bundle integrity but is not Developer ID signed or notarized, so macOS may require explicit approval before its first launch. Data is stored under `~/Library/Application Support/Headwater/`, with daemon identity and account state in `daemon/`. Replace the application manually to update; application data remains separate from the app bundle.

            ## Data and verification

            The data directories contain your local identity, account database, and authentication secrets. Do not treat a nightly artifact as a backup, and do not delete its data directory unless you intend to remove that identity. Flatpak and AppImage use different data locations and do not automatically share or migrate identities.

            Compute the selected download's hash with `sha256sum "Headwater-...AppImage"` or `sha256sum "Headwater-...flatpak"` on Linux, `shasum -a 256 "Headwater-...dmg"` on macOS, or `Get-FileHash -Algorithm SHA256 .\Headwater-...exe` in PowerShell. Replace the abbreviated name with the exact downloaded filename and compare the result with that file's line in `SHA256SUMS.txt`. Checksums detect download corruption; because they are published beside unsigned artifacts, they are not proof of publisher identity.
        run: |
          gh release delete nightly --repo "${GITHUB_REPOSITORY}" --cleanup-tag --yes || true
          gh release create nightly nightly-artifacts/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Headwater Nightly ${GITHUB_SHA::7}" \
            --notes "${RELEASE_NOTES}" \
            --prerelease
